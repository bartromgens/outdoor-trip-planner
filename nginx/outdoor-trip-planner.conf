# VPS nginx configuration for outdoor-trip-planner
#
# Initial setup:
#   1. Install certbot:    sudo apt install certbot python3-certbot-nginx
#   2. Obtain certificate: sudo certbot certonly --webroot -w /var/www/html -d example.com -d www.example.com
#   3. Copy this file to:  /etc/nginx/sites-available/outdoor-trip-planner
#   4. Enable it:          sudo ln -s /etc/nginx/sites-available/outdoor-trip-planner /etc/nginx/sites-enabled/
#   5. Test config:        sudo nginx -t
#   6. Reload nginx:       sudo systemctl reload nginx

server {
    listen 80;
    server_name example.com www.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://example.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://example.com$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/    { proxy_pass http://127.0.0.1:8026; proxy_read_timeout 90s; }
    location /admin/  { proxy_pass http://127.0.0.1:8026; }
    location /static/ { proxy_pass http://127.0.0.1:8026; }

    location / { proxy_pass http://127.0.0.1:3026; }
}
