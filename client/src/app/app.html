<mat-sidenav-container
  class="sidenav-container"
  [class.sidebar-open]="isMobile() && sidenavOpened()"
>
  <mat-sidenav
    #sidenav
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    (openedChange)="sidenavOpened.set($event)"
  >
    <app-map-selector />
    <div class="sidebar-inputs">
      <app-location-search />
      <app-departure-datetime-picker />
    </div>
    <app-chat />
  </mat-sidenav>

  <mat-sidenav-content>
    <button
      class="sidebar-toggle"
      type="button"
      (click)="toggleSidebar()"
      [attr.aria-label]="sidenavOpened() ? 'Close sidebar' : 'Open sidebar'"
    >
      <mat-icon>{{ sidenavOpened() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
