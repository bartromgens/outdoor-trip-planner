<mat-toolbar class="toolbar-white">
  <span>{{ title() }}</span>
  <span class="toolbar-spacer"></span>
  <div
    class="location-search-wrapper"
    [class.sidebar-open]="isMobile() && sidenavOpened()"
  >
    <app-location-search />
  </div>
  @if (!isMobile()) {
    <app-departure-datetime-picker />
  }
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    (openedChange)="sidenavOpened.set($event)"
  >
    <app-map-selector />
    <app-chat />
  </mat-sidenav>

  <mat-sidenav-content>
    <button
      class="sidebar-toggle"
      type="button"
      (click)="toggleSidebar()"
      [attr.aria-label]="sidenavOpened() ? 'Close sidebar' : 'Open sidebar'"
    >
      <mat-icon>{{ sidenavOpened() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
