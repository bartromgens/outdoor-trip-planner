<div class="home-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>API Health Check</mat-card-title>
      <mat-card-subtitle>Status of the Django backend</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      @if (loading()) {
        <div class="spinner-wrap">
          <mat-spinner diameter="24"></mat-spinner>
          <span>Checking API status…</span>
        </div>
      } @else if (error()) {
        <p class="status-value status-error">{{ error() }}</p>
      } @else {
        <p>
          Status: <span class="status-value status-ok">{{ health()?.status }}</span>
        </p>
      }
    </mat-card-content>
  </mat-card>
</div>
