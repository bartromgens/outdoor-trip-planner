<div id="map" [class.map--adding]="addingLocation"></div>
@if (reachabilityLoading) {
  <div class="map-loading-overlay">
    <span class="map-loading-overlay__text">Loading reachability&hellip;</span>
  </div>
}
<div class="map-controls">
  <button
    mat-raised-button
    [color]="addingLocation ? 'warn' : 'primary'"
    (click)="toggleAddLocation()"
  >
    {{ addingLocation ? 'Cancel' : '+ Add location' }}
  </button>
</div>
