<div class="map-selector">
  <mat-form-field class="map-selector__field" appearance="outline" subscriptSizing="dynamic">
    <mat-label>Map</mat-label>
    <mat-select
      [ngModel]="currentMapUuid()"
      (ngModelChange)="switchToMap($event)"
      (keydown)="$event.stopPropagation()"
    >
      @for (map of myMaps(); track map.uuid) {
        <mat-option [value]="map.uuid">{{ map.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <button
    mat-icon-button
    type="button"
    matTooltip="New map"
    (click)="openNewMapDialog()"
  >
    <mat-icon>add</mat-icon>
  </button>
  <button
    mat-icon-button
    type="button"
    matTooltip="Rename map"
    (click)="openRenameDialog()"
  >
    <mat-icon>edit</mat-icon>
  </button>
  <button
    mat-icon-button
    type="button"
    matTooltip="Copy share link"
    (click)="copyShareLink()"
  >
    <mat-icon>link</mat-icon>
  </button>
</div>
